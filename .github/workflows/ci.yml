name: CI - CRUD Disciplinas

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes BDD
        run: python -m behave

      - name: Rodar testes com cobertura mínima
        run: python -m pytest tests --cov=app --cov-report=term-missing --cov-fail-under=75